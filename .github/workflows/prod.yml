name: Build and Push Docker Image

# 1. Déclenchement du workflow
on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # 2. Récupération du code source
      - name: Checkout code
        uses: actions/checkout@v3

      # 3. Connexion au Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Construction et Push de l'image
      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          # REMPLACE 'ton_username' par ton vrai pseudo DockerHub ci-dessous
          tags: ashxivy/applied_statistics:latest