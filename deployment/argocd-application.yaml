apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: obesity-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/edequercize/applied_statistics.git
    targetRevision: main
    path: deployment
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
