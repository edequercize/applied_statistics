apiVersion: apps/v1
kind: Deployment
metadata:
  name: obesity-api
  labels:
    app: obesity-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: obesity-api
  template:
    metadata:
      labels:
        app: obesity-api
    spec:
      containers:
        - name: obesity-api
          image: obesity-api:latest  # À remplacer par l'image du registry
          ports:
            - containerPort: 8000
          env:
            - name: MODEL_PATH
              value: "models/best_model.joblib"
          resources:
            requests:
              memory: "256Mi"
              cpu: "250m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: obesity-api-svc
spec:
  selector:
    app: obesity-api
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
  type: ClusterIP
