# ============================================================
# Configuration centralisée du projet Obesity Classification
# ============================================================

data:
  path: "src/data/ObesityDataSet_raw_and_data_sinthetic.csv"
  target: "NObeyesdad"
  test_size: 0.2
  random_state: 42
  # Colonnes à supprimer (liées directement à la target)
  drop_columns: ["Weight", "Height"]

features:
  # Colonnes ordinales (entiers issus de SMOTE, à arrondir)
  ordinal: ["FAF", "FCVC", "NCP", "TUE", "CH2O"]
  # Seuil min de fréquence pour OneHotEncoder
  ohe_min_frequency: 10

ordinal_mapping:
  Insufficient_Weight: 0
  Normal_Weight: 1
  Overweight_Level_I: 2
  Overweight_Level_II: 3
  Obesity_Type_I: 4
  Obesity_Type_II: 5
  Obesity_Type_III: 6

model:
  param_grid:
    clf__n_estimators: [50, 100, 200]
    clf__max_depth: [4, 8, 12]
    clf__learning_rate: [0.01, 0.05, 0.1]
    clf__num_leaves: [15, 31, 63]
  cv: 3

mlflow:
  experiment_name: "obesity-classification"
  tracking_uri: "mlruns"
