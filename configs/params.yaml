# ============================================================
# Configuration centralisée du projet Obesity Classification
# ============================================================

data:
  path: "data/ObesityDataSet_raw_and_data_sinthetic.csv"
  target: "NObeyesdad"
  test_size: 0.2
  random_state: 42
  # Colonnes à supprimer (liées directement à la target)
  drop_columns: ["Weight", "Height"]

features:
  # Colonnes ordinales (entiers issus de SMOTE, à arrondir)
  ordinal: ["FAF", "FCVC", "NCP", "TUE", "CH2O"]
  # Seuil min de fréquence pour OneHotEncoder
  ohe_min_frequency: 10

ordinal_mapping:
  Insufficient_Weight: 0
  Normal_Weight: 1
  Overweight_Level_I: 2
  Overweight_Level_II: 3
  Obesity_Type_I: 4
  Obesity_Type_II: 5
  Obesity_Type_III: 6

models:
  # Régression logistique ordinale (mord)
  mord:
    enabled: true

  # Random Forest
  random_forest:
    enabled: true
    param_grid:
      clf__n_estimators: [50, 100, 200]
      clf__max_depth: [4, 8, 12]
      clf__min_samples_split: [2, 5, 10]
    cv: 3

  # LightGBM
  lightgbm:
    enabled: true
    param_grid:
      clf__n_estimators: [50, 100, 200]
      clf__max_depth: [4, 8, 12]
      clf__learning_rate: [0.01, 0.05, 0.1]
      clf__num_leaves: [15, 31, 63]
    cv: 3

  # Réseau de neurones CORAL
  coral:
    enabled: true
    hidden_layers: [64, 32]
    dropout: 0.2
    learning_rate: 0.01
    epochs: 30
    batch_size: 32

mlflow:
  experiment_name: "obesity-classification"
  tracking_uri: "mlruns"
